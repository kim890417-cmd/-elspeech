# ===================================================================
#  관리자 화면 설정 파일 (이엘스피치학원)
#  이미 배포 완료된 설정입니다. 평소엔 건드릴 필요 없습니다.
# ===================================================================

backend:
  name: github
  repo: kim890417-cmd/-elspeech         # 이엘스피치 저장소
  branch: main
  base_url: https://academy-auth.kim890417.workers.dev   # 인증 워커

media_folder: "public/images/uploads"
public_folder: "/images/uploads"
locale: "ko"

collections:
  - name: "site"
    label: "학원 페이지 내용"
    files:
      - name: "content"
        label: "랜딩페이지 (전체 내용)"
        file: "public/content/content.json"
        description: "학원 이름, 소개글, 강사, 과정, 사진을 여기서 수정합니다."
        fields:
          - { label: "학원 이름", name: "academy_name", widget: "string" }
          - { label: "로고 글자", name: "logo_text", widget: "string" }
          - { label: "검색 설명문구 (SEO)", name: "seo_description", widget: "text", required: false }

          - label: "① 상단 대표 영역 (Hero)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "작은 배지 문구", name: "badge", widget: "string", required: false }
              - { label: "큰 제목", name: "title", widget: "text", hint: "줄바꿈하면 그대로 줄이 나뉩니다" }
              - { label: "설명 문장", name: "subtitle", widget: "text" }
              - { label: "버튼 문구", name: "cta_text", widget: "string" }
              - { label: "배경 사진", name: "background_image", widget: "image", required: false }

          - label: "② 숫자 성과 (4개 권장)"
            name: "stats"
            widget: "list"
            fields:
              - { label: "숫자/문구", name: "number", widget: "string", hint: "예: 2, 9단계, 현직" }
              - { label: "설명", name: "label", widget: "string" }

          - label: "③ 교육 철학"
            name: "philosophy"
            widget: "object"
            fields:
              - { label: "영문 머리말", name: "eyebrow", widget: "string", required: false }
              - { label: "핵심 문장", name: "title", widget: "string" }
              - { label: "설명", name: "body", widget: "text" }

          - label: "④ 강사진 섹션 제목"
            name: "instructors_section"
            widget: "object"
            fields:
              - { label: "영문 머리말", name: "eyebrow", widget: "string", required: false }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "subtitle", widget: "text", required: false }
          - label: "강사 목록"
            name: "instructors"
            widget: "list"
            fields:
              - { label: "이름", name: "name", widget: "string" }
              - { label: "직함", name: "role", widget: "string", hint: "예: 대표원장" }
              - { label: "사진", name: "photo", widget: "image", required: false }
              - { label: "경력/이력", name: "credentials", widget: "list", field: { label: "한 줄", name: "item", widget: "string" } }

          - label: "⑤ 강점 섹션 제목"
            name: "features_section"
            widget: "object"
            fields:
              - { label: "영문 머리말", name: "eyebrow", widget: "string", required: false }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "subtitle", widget: "text", required: false }
          - label: "강점 목록 (3개 권장)"
            name: "features"
            widget: "list"
            fields:
              - { label: "아이콘(이모지)", name: "icon", widget: "string", required: false, hint: "예: 🎙️ 📊 🎬" }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }

          - label: "⑥ 교육과정 섹션 제목"
            name: "programs_section"
            widget: "object"
            fields:
              - { label: "영문 머리말", name: "eyebrow", widget: "string", required: false }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "subtitle", widget: "text", required: false }
          - label: "교육과정 목록"
            name: "programs"
            widget: "list"
            fields:
              - { label: "과정 이름", name: "title", widget: "string" }
              - { label: "대상 (배지)", name: "target", widget: "string", required: false, hint: "예: 초·중·고" }
              - { label: "설명", name: "description", widget: "text" }
              - { label: "사진", name: "image", widget: "image", required: false }
              - { label: "세부 항목(태그)", name: "items", widget: "list", required: false, field: { label: "항목", name: "item", widget: "string" } }

          - label: "⑦ 시설 섹션 제목"
            name: "facilities_section"
            widget: "object"
            fields:
              - { label: "영문 머리말", name: "eyebrow", widget: "string", required: false }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "subtitle", widget: "text", required: false }
          - label: "시설 사진 (자주 바꾸는 곳)"
            name: "facilities"
            widget: "list"
            fields:
              - { label: "사진", name: "image", widget: "image", required: false }
              - { label: "사진 설명", name: "caption", widget: "string", required: false }

          - label: "⑧ 후기 섹션 제목"
            name: "testimonials_section"
            widget: "object"
            fields:
              - { label: "영문 머리말", name: "eyebrow", widget: "string", required: false }
              - { label: "제목", name: "title", widget: "string" }
          - label: "수강 후기 목록"
            name: "testimonials"
            widget: "list"
            fields:
              - { label: "후기 내용", name: "text", widget: "text" }
              - { label: "작성자", name: "name", widget: "string" }

          - label: "⑨ 수상·합격 섹션 제목"
            name: "achievements_section"
            widget: "object"
            fields:
              - { label: "영문 머리말", name: "eyebrow", widget: "string", required: false }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "subtitle", widget: "text", required: false }
          - label: "수상·합격 사진"
            name: "achievements"
            widget: "list"
            fields:
              - { label: "사진", name: "image", widget: "image", required: false }
              - { label: "사진 설명", name: "caption", widget: "string", required: false }

          - label: "⑩ 캠퍼스 섹션 제목"
            name: "campuses_section"
            widget: "object"
            fields:
              - { label: "영문 머리말", name: "eyebrow", widget: "string", required: false }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "subtitle", widget: "text", required: false }
          - label: "캠퍼스 목록 (청주/대전)"
            name: "campuses"
            widget: "list"
            fields:
              - { label: "캠퍼스 이름", name: "name", widget: "string" }
              - { label: "전화번호", name: "phone", widget: "string" }
              - { label: "주소", name: "address", widget: "string" }
              - { label: "운영시간", name: "hours", widget: "string", required: false }
              - { label: "주차 안내", name: "parking", widget: "string", required: false }
              - { label: "지도 임베드 주소(src)", name: "map_embed", widget: "string", required: false, hint: "네이버/구글 지도 '공유 > 퍼가기' iframe 의 src 주소" }

          - label: "⑪ 하단 상담 유도 (CTA)"
            name: "cta"
            widget: "object"
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "subtitle", widget: "text", required: false }
              - { label: "대표 전화번호", name: "phone", widget: "string" }
              - { label: "카카오 채팅 링크", name: "kakao_link", widget: "string", required: false }

          - label: "⑫ 맨 아래 푸터"
            name: "footer"
            widget: "object"
            fields:
              - { label: "연락처 한 줄", name: "contact", widget: "string", required: false }
              - { label: "저작권 문구", name: "text", widget: "string" }
